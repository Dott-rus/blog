name: Deploy Hugo to GitHub Pages

on:
  push:  # Триггерим при любом пуше в main
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive  # Важно для темы!

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v2
        with:
          hugo-version: "latest"
          extended: true  # Обязательно для SCSS!

      - name: Build
        run: hugo --minify --baseURL "https://ваш-username.github.io/my-hugo-blog/"

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
